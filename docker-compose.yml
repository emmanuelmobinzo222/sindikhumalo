version: '3.8'

services:
  # Redis for caching and real-time data
  redis:
    image: redis:7-alpine
    container_name: kota-pal-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-redis-secure-password}
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # PostgreSQL for persistent data (optional)
  postgres:
    image: postgres:15-alpine
    container_name: kota-pal-postgres
    environment:
      POSTGRES_DB: kota-pal
      POSTGRES_USER: ${DB_USER:-admin}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-secure-password}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./scripts/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-admin}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # KOTA PAL Backend Service
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: kota-pal-backend
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    environment:
      PORT: 3000
      NODE_ENV: ${NODE_ENV:-production}
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      REDIS_URL: redis://:${REDIS_PASSWORD:-redis-secure-password}@redis:6379
      DATABASE_URL: postgresql://${DB_USER:-admin}:${DB_PASSWORD:-secure-password}@postgres:5432/kota-pal
      
      # Retailer API Keys (from .env)
      AMAZON_API_URL: ${AMAZON_API_URL}
      AMAZON_PA_API_KEY: ${AMAZON_PA_API_KEY}
      AMAZON_PA_API_SECRET: ${AMAZON_PA_API_SECRET}
      
      WALMART_API_URL: ${WALMART_API_URL}
      WALMART_API_KEY: ${WALMART_API_KEY}
      
      SHOPIFY_API_URL: ${SHOPIFY_API_URL}
      SHOPIFY_API_KEY: ${SHOPIFY_API_KEY}
      
      SKIMLINKS_API_URL: ${SKIMLINKS_API_URL}
      SKIMLINKS_API_KEY: ${SKIMLINKS_API_KEY}
    ports:
      - "3000:3000"
    volumes:
      - ./backend-enhanced.js:/app/backend-enhanced.js
      - ./services:/app/services
      - ./logs:/app/logs
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Nginx Reverse Proxy (optional, for production)
  nginx:
    image: nginx:alpine
    container_name: kota-pal-nginx
    depends_on:
      - backend
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    restart: unless-stopped

volumes:
  redis-data:
  postgres-data:

networks:
  default:
    name: kota-pal-network
